<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="header">
    <meta charset="UTF-8">
    <title>CineManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<header th:fragment="header" class="bg-slate-900 p-4 shadow-xl">
    <div class="container mx-auto flex justify-between items-center">
        <a href="/home" class="text-white text-2xl font-bold tracking-tighter hover:text-blue-400 transition">
            Cine<span class="text-blue-500">Manager</span>
        </a>
        <nav class="space-x-6 text-gray-300 font-medium">
            <a href="/home" class="hover:text-white transition">Accueil</a>
            <a sec:authorize="isAuthenticated()" href="/films/page/1" class="hover:text-white transition"> Films</a>
            <a sec:authorize="isAuthenticated()" href="/films/categories" class="hover:text-white transition">Catégories</a>
            <a  sec:authorize="hasRole('ADMIN')" href="/actors/all" class="hover:text-white transition">Acteurs</a>


            <span sec:authorize="!isAuthenticated()">
                <a href="/login" class="hover:text-white transition">Connexion</a>
            </span>

            <span sec:authorize="isAuthenticated()">
                <span class="text-sm text-blue-400">[[${#authentication.name}]]</span>
                <form action="/logout" method="post" class="inline">
                    <input type="hidden" name="token" th:value="${token}">
                    <button type="submit" class="hover:text-white transition">Déconnexion</button>
                </form>
            </span>
        </nav>
    </div>
</header>

<footer th:fragment="footer" class="bg-slate-900 text-gray-400 py-8 mt-12 border-t border-slate-800">
    <div class="container mx-auto px-4 text-center">
        <p class="mb-2">&copy; 2026 CineManager. Tous droits réservés.</p>
        <div class="flex justify-center space-x-4 text-sm">
            <a href="#" class="hover:text-white">Confidentialité</a>
            <a href="#" class="hover:text-white">Contact</a>
            <a href="#" class="hover:text-white">API Documentation</a>
        </div>
    </div>
</footer>

</body>
</html>
