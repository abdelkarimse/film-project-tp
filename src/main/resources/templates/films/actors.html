<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
    <title>Casting - Liste des Acteurs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50 font-sans antialiased">
<div th:replace="~{layout :: header}"></div>

<main class="flex-grow container mx-auto px-4 py-8">

    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Casting & Acteurs</h1>
            <p class="text-slate-500 text-sm">Gérez les talents de vos productions cinématographiques</p>
        </div>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/actors/add}" class="group flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
            <svg class="w-5 h-5 group-hover:rotate-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            <span class="font-bold">Nouvel Acteur</span>
        </a>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div th:each="a : ${actors}" class="group bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden relative">

            <div class="h-24 bg-gradient-to-br from-indigo-500 to-purple-600 flex items-end justify-center">
                <div class="w-16 h-16 bg-white rounded-full shadow-md flex items-center justify-center translate-y-8 border-4 border-white">
                    <span class="text-xl font-black text-indigo-600" th:text="${#strings.substring(a.prenom,0,1)} + ${#strings.substring(a.nom,0,1)}">JD</span>
                </div>
            </div>

            <div class="pt-10 p-6 text-center">
                <span class="text-[10px] font-mono text-slate-400 block mb-1" th:text="'ID: #' + ${a.id}">#1</span>
                <h3 class="text-lg font-bold text-slate-800 leading-tight" th:text="${a.prenom} + ' ' + ${a.nom}">Prénom Nom</h3>
                <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest font-semibold">Acteur / Actrice</p>

                <div class="mt-6 flex items-center justify-center gap-3 pt-4 border-t border-slate-50">
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/actors/edit/{id}(id=${a.id})}" class="text-slate-400 hover:text-indigo-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                    </a>

                      <form sec:authorize="hasRole('ADMIN')" th:action="@{/actors/delete/{id}(id=${a.id})}" method="post"
                          onsubmit="return confirm('Retirer cet acteur du casting ?');">
                        <button type="submit" class="text-slate-400 hover:text-red-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(actors)}" class="col-span-full py-20 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-slate-100 rounded-full mb-4">
                <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800">Aucun acteur trouvé</h2>
            <p class="text-slate-500">Commencez par ajouter des talents à votre base de données.</p>
        </div>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>

</body>
</html>
