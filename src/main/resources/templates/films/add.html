<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <title>CineManager | Ajouter un Film</title>
</head>
<body>
<div th:replace="~{layout :: header}"></div>

<div >
    <div class="max-w-3xl mx-auto">

        <div class="mb-8">
            <nav class="flex mb-4 text-sm text-slate-500">
                <a href="/films" class="hover:text-blue-600">Films</a>
                <span class="mx-2">/</span>
                <span class="text-slate-800 font-medium">Nouveau Film</span>
            </nav>
            <h2 class="text-3xl font-extrabold text-slate-800">Ajouter un nouveau chef-d'œuvre</h2>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <form th:action="@{/films/save}" th:object="${film}" method="post" enctype="multipart/form-data" class="p-8 lg:p-10">
                <input type="hidden" th:field="*{id}" />

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div class="md:col-span-2 space-y-2">
                        <label for="titre" class="block text-sm font-semibold text-slate-700">Titre du Film</label>
                        <input type="text" id="titre" th:field="*{titre}"
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                               placeholder="Ex: Inception, Le Parrain..." required>
                    </div>

                    <div class="space-y-2">
                        <label for="annepartution" class="block text-sm font-semibold text-slate-700">Année de Parution</label>
                        <input type="number" id="annepartution" th:field="*{annepartution}"
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                               min="1888" max="2099" required>
                    </div>

                    <div class="space-y-2">
                        <label for="category" class="block text-sm font-semibold text-slate-700">Catégorie</label>
                        <select id="category" th:field="*{category}"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition appearance-none cursor-pointer"
                                required>
                            <option value="" th:if="${#lists.isEmpty(categories)}" disabled selected>⚠️ Aucune catégorie trouvée</option>
                            <option value="" th:unless="${#lists.isEmpty(categories)}" selected>-- Choisir un genre --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.nom}"></option>
                        </select>
                        <p th:if="${#lists.isEmpty(categories)}" class="text-xs text-red-500 mt-1 italic">
                            Veuillez d'abord créer une <a href="/films/addcategories" class="underline">catégorie ici</a>.
                        </p>
                    </div>

                    <div class="md:col-span-2 space-y-2">
                        <label for="file" class="block text-sm font-semibold text-slate-700">Image du Film</label>
                        <input type="file" id="file" name="file" accept="image/*"
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>

                    <div class="md:col-span-2 space-y-2">
                        <label for="description" class="block text-sm font-semibold text-slate-700">Synopsis / Description</label>
                        <textarea id="description" th:field="*{description}" rows="4"
                                  class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition resize-none"
                                  placeholder="Décrivez l'intrigue du film..."></textarea>
                    </div>
                    <div class="space-y-3">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">
                            Casting (Sélectionnez les acteurs)
                        </label>

                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 max-h-48 overflow-y-auto p-2 bg-slate-50 rounded-xl border border-slate-200">
                            <div th:each="a : ${actors}" class="relative">
                                <label class="group flex items-center p-3 block w-full bg-white border border-slate-200 rounded-lg cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all">
                                    <input type="checkbox" name="acteurs" th:value="${a.id}"
                                           class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="ml-3 text-sm font-medium text-slate-700 group-hover:text-blue-700"
                                          th:text="${a.prenom} + ' ' + ${a.nom}">Nom Acteur</span>
                                </label>
                            </div>
                        </div>
                        <p class="text-[10px] text-slate-400 italic">Faites défiler pour voir tous les acteurs disponibles.</p>
                    </div>
                </div>

                <div class="mt-10 flex flex-col sm:flex-row-reverse gap-3 pt-6 border-t border-slate-100">
                    <button type="submit"
                            th:disabled="${#lists.isEmpty(categories)}"
                            class="px-8 py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-95">
                        Ajouter à la collection
                    </button>
                    <a th:href="@{/films}"
                       class="px-8 py-3 bg-white border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition text-center">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{layout :: footer}"></div>

</body>
</html>
